<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ความรู้รอบตัว 1 - Quiz Game</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 50%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pastel-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-2xl">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-card rounded-[3rem] p-8 md:p-12 text-center pastel-shadow fade-in">
            <div class="mb-6 flex justify-center">
                <span class="text-6xl">✨</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 mb-4 py-4">
                ความรู้รอบตัว 1
            </h1>
            <p class="text-gray-600 mb-10 text-lg">มาทดสอบความรู้สนุกๆ 20 ข้อกันเถอะ!</p>
            <button onclick="startGame()" class="bg-pink-400 hover:bg-pink-500 text-white font-bold py-4 px-10 rounded-full text-xl transition-all hover:scale-105 active:scale-95 shadow-lg flex items-center justify-center mx-auto">
                <span class="mr-2">🎮</span> เริ่มเล่นเลย
            </button>
            <p class="mt-12 text-gray-400 font-medium">Made by Pat</p>
        </div>

        <!-- Quiz Screen (Hidden by default) -->
        <div id="quiz-screen" class="hidden fade-in">
            <div class="flex justify-between items-center mb-6 px-2">
                <span id="progress-text" class="bg-violet-100 text-violet-600 px-4 py-1.5 rounded-full font-bold text-sm">ข้อที่ 1 / 20</span>
                <span id="score-text" class="bg-pink-100 text-pink-600 px-4 py-1.5 rounded-full font-bold text-sm">คะแนน: 0</span>
            </div>

            <div class="glass-card rounded-[2.5rem] p-6 md:p-10 pastel-shadow">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-relaxed">
                    คำถามกำลังโหลด...
                </h2>

                <div id="options-container" class="space-y-4 mb-8">
                    <!-- Options will be injected here -->
                </div>

                <div id="explanation-container" class="hidden">
                    <div id="explanation-box" class="p-6 rounded-2xl mb-8 border transition-colors">
                        <h3 id="result-title" class="font-bold text-lg mb-2">เฉลย</h3>
                        <p id="explanation-text" class="text-gray-700 leading-relaxed"></p>
                    </div>
                    <div class="flex justify-end">
                        <button id="next-btn" onclick="nextQuestion()" class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-full text-lg transition-all shadow-md flex items-center">
                            ข้อต่อไป <span>➡️</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- End Screen (Hidden by default) -->
        <div id="end-screen" class="hidden glass-card rounded-[3rem] p-8 md:p-12 text-center pastel-shadow fade-in">
            <div class="mb-6 flex justify-center text-6xl">🏆</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">จบเกมแล้ว!</h2>
            <p class="text-gray-600 mb-6">คุณทำได้ยอดเยี่ยมมาก!</p>
            
            <div class="bg-gradient-to-r from-pink-50 to-blue-50 rounded-3xl p-8 mb-8 border border-white shadow-inner">
                <div id="final-score" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">
                    0 <span class="text-3xl text-gray-400">/ 20</span>
                </div>
            </div>

            <button onclick="startGame()" class="bg-violet-400 hover:bg-violet-500 text-white font-bold py-4 px-10 rounded-full text-xl transition-all hover:scale-105 active:scale-95 shadow-lg flex items-center justify-center mx-auto">
                <span class="mr-2">🔄</span> เล่นอีกครั้ง
            </button>
            <p class="mt-8 text-gray-400 font-medium">Made by Pat</p>
        </div>
    </div>

    <script>
        const questions = [
            { q: 'อวัยวะส่วน "หัวใจ" ของกุ้ง ตั้งอยู่ที่บริเวณใดของร่างกาย?', options: ['บริเวณหน้าอก', 'บริเวณหัว'], correct: 'บริเวณหัว', exp: 'หัวใจของกุ้งตั้งอยู่ที่ส่วนหัว (Cephalothorax) ใกล้กับกระเพาะอาหาร เนื่องจากโครงสร้างร่างกายของสัตว์กลุ่มกุ้งกั้งปูไม่มีกระดูกสันหลัง จึงมีระบบไหลเวียนเลือดที่รวมศูนย์อยู่ในส่วนหัวเป็นหลัก' },
            { q: 'ในช่วงเวลากลางวัน ท้องฟ้าบน "ดาวอังคาร" มักจะมองเห็นเป็นสีอะไร?', options: ['สีแดงอมชมพู', 'สีน้ำเงินเข้ม'], correct: 'สีแดงอมชมพู', exp: 'เนื่องจากชั้นบรรยากาศของดาวอังคารเต็มไปด้วยฝุ่นละอองที่เป็นสนิมเหล็ก ซึ่งสะท้อนแสงอาทิตย์ออกมาเป็นโทนสีแดง แต่สิ่งที่น่าทึ่งคือในช่วงพระอาทิตย์ตก ท้องฟ้าบนดาวอังคารจะกลายเป็นสีน้ำเงินแทน' },
            { q: 'สัตว์ชนิดใดที่มี "ลายนิ้วมือ" คล้ายคลึงกับมนุษย์มากจนอาจทำให้เกิดความสับสนในที่เกิดเหตุได้?', options: ['โคอาล่า', 'แรคคูน'], correct: 'โคอาล่า', exp: 'โคอาล่ามีลายนิ้วมือ (Fingerprints) ที่มีรูปแบบเส้นนูนคล้ายกับมนุษย์อย่างน่าเหลือเชื่อ แม้จะส่องด้วยกล้องจุลทรรศน์ก็ยังแยกแยะได้ยาก ซึ่งเป็นวิวัฒนาการที่ช่วยในการยึดเกาะต้นไม้ได้อย่างมีประสิทธิภาพ' },
            { q: 'อาหารชนิดใดที่นักโบราณคดีพบว่า "ไม่มีวันเสีย" แม้จะผ่านไปนานหลายพันปี?', options: ['ข้าวสาร', 'น้ำผึ้ง'], correct: 'น้ำผึ้ง', exp: 'น้ำผึ้งมีความชื้นต่ำมากและมีความเป็นกรดตามธรรมชาติ ทำให้ออกซิเจนเข้าถึงได้ยาก แบคทีเรียจึงไม่สามารถเจริญเติบโตได้ นักโบราณคดีเคยพบน้ำผึ้งในสุสานอียิปต์โบราณที่ยังคงทานได้อยู่' },
            { q: 'ในแต่ละปีมีต้นไม้เกิดใหม่หลายล้านต้นจากการที่สัตว์ชนิดใด "ลืม" ที่ซ่อนอาหารของตัวเอง?', options: ['กระรอก', 'ลิง'], correct: 'กระรอก', exp: 'กระรอกมีพฤติกรรมเก็บสะสมลูกนัทและเมล็ดพืชไว้ใต้ดินเพื่อสำรองไว้กินในฤดูหนาว แต่พวกมันมักจะลืมตำแหน่งที่ฝังไว้บ่อยครั้ง เมล็ดพืชเหล่านั้นจึงเติบโตขึ้นกลายเป็นต้นไม้ใหญ่ ช่วยขยายพื้นที่ป่าโดยธรรมชาติ' },
            { q: '"ปลาหมึกยักษ์" มีหัวใจทั้งหมดกี่ดวง?', options: ['1 ดวง', '3 ดวง'], correct: '3 ดวง', exp: 'ปลาหมึกมีหัวใจ 3 ดวง โดย 2 ดวงทำหน้าที่สูบฉีดเลือดไปที่เหงือก และดวงที่ 3 ทำหน้าที่สูบฉีดเลือดไปยังส่วนต่างๆ ของร่างกาย เพื่อรองรับการเคลื่อนที่อย่างรวดเร็วและการใช้พลังงานสูง' },
            { q: 'ผลไม้ชนิดใดในทางพฤกษศาสตร์ถือว่าเป็น "เบอร์รี" (Berry)?', options: ['สตรอว์เบอร์รี', 'กล้วย'], correct: 'กล้วย', exp: 'ตามหลักพฤกษศาสตร์ เบอร์รีต้องเป็นผลที่เกิดจากดอกเดียวและมีเมล็ดอยู่ภายในเนื้อ ซึ่งกล้วยตรงตามนิยามนี้ ในขณะที่สตรอว์เบอร์รีถือเป็น "ผลกลุ่ม" (Aggregate fruit) เพราะมีเมล็ดอยู่ด้านนอก' },
            { q: 'สัตว์ชนิดใดที่มีพฤติกรรม "สร้างมิตรภาพ" และมีเพื่อนสนิทในกลุ่ม?', options: ['วัว', 'จระเข้'], correct: 'วัว', exp: 'งานวิจัยพบว่าวัวเป็นสัตว์สังคมที่ฉลาด พวกมันจะมีเพื่อนสนิทและจะรู้สึกเครียดน้อยลงเมื่อได้อยู่ใกล้ชิดกับเพื่อนตัวโปรดในฝูง' },
            { q: '"ผึ้ง" ใช้วิธีการใดในการสื่อสารเพื่อบอกพิกัดของแหล่งอาหารให้เพื่อนในฝูงทราบ?', options: ['การส่งเสียงหึ่งในโทนที่ต่างกัน', 'การเต้นรำ (Waggle Dance)'], correct: 'การเต้นรำ (Waggle Dance)', exp: 'ผึ้งสื่อสารด้วยการ "เต้นส่ายก้น" เป็นรูปตัวเลขแปด (8) โดยทิศทางและระยะเวลาของการเต้นจะระบุถึงองศาของดวงอาทิตย์และระยะทางจากรังไปถึงดอกไม้ได้อย่างแม่นยำ' },
            { q: 'สัตว์ชนิดใดที่สามารถ "นอนหลับ" ได้นานต่อเนื่องถึง 3 ปี?', options: ['หอยทาก', 'หมีขั้วโลก'], correct: 'หอยทาก', exp: 'ในสภาวะที่อากาศแห้งแล้งเกินไปหรือขาดแคลนอาหาร หอยทากบางชนิดสามารถจำศีลโดยการนอนนิ่งๆ และปิดฝาเปลือกไว้ได้นานถึง 3 ปีเพื่อรอสภาพอากาศที่เหมาะสม' },
            { q: 'ผิวหนังที่แท้จริงภายใต้ขนสีขาวของ "หมีขั้วโลก" คือสีอะไร?', options: ['สีขาว', 'สีดำ'], correct: 'สีดำ', exp: 'หมีขั้วโลกมีผิวหนังสีดำเพื่อช่วยในการดูดซับความร้อนจากแสงอาทิตย์ให้ได้มากที่สุด ส่วนขนที่เห็นเป็นสีขาวนั้น จริงๆ แล้วเป็นขนโปร่งแสงที่สะท้อนแสงจนดูเหมือนสีขาว' },
            { q: '"ผีเสื้อ" ใช้ส่วนใดของร่างกายในการรับรสชาติอาหาร?', options: ['ปีก', 'เท้า'], correct: 'เท้า', exp: 'ผีเสื้อมีเซนเซอร์รับรสอยู่ที่เท้า เพื่อใช้ตรวจสอบว่าใบไม้ที่มันเกาะอยู่นั้นเป็นพืชชนิดที่เหมาะสมสำหรับวางไข่หรือมีสารอาหารที่ต้องการหรือไม่' },
            { q: '"หัวใจ" ของสัตว์ชนิดใดที่มีขนาดใหญ่เท่ากับรถยนต์ขนาดเล็ก?', options: ['ช้างแอฟริกา', 'ปลาวาฬสีน้ำเงิน'], correct: 'ปลาวาฬสีน้ำเงิน', exp: 'ปลาวาฬสีน้ำเงินเป็นสัตว์ที่มีขนาดใหญ่ที่สุดในโลก หัวใจของมันอาจมีน้ำหนักถึง 180 กิโลกรัม และมีขนาดใหญ่พอๆ กับรถกอล์ฟหรือรถยนต์ขนาดเล็กเลยทีเดียว' },
            { q: 'สัตว์ชนิดใดที่ไม่สามารถ "อาเจียน" ออกมาได้?', options: ['สุนัข', 'หนู'], correct: 'หนู', exp: 'หนูมีระบบทางเดินอาหารที่มีลิ้นกั้นที่แข็งแรงมากและไม่มีกลไกในสมองที่สั่งการให้เกิดการอาเจียน นี่คือเหตุผลว่าทำไมยาเบื่อหนูจึงได้ผลดีกับพวกมันเป็นพิเศษ' },
            { q: 'ใน 1 วันบน "ดาวศุกร์" มีระยะเวลานานกว่า 1 ปีบนดาวศุกร์ จริงหรือไม่?', options: ['จริง', 'ไม่จริง'], correct: 'จริง', exp: 'ดาวศุกร์หมุนรอบตัวเองช้ามาก (1 รอบใช้เวลา 243 วันโลก) แต่โคจรรอบดวงอาทิตย์เร็วกว่า (1 รอบใช้เวลา 225 วันโลก) ทำให้ 1 วันบนดาวศุกร์ยาวนานกว่า 1 ปีของตัวมันเอง' },
            { q: '"หอไอเฟล" สามารถมีความสูงเพิ่มขึ้นได้ในช่วงฤดูร้อน จริงหรือไม่?', options: ['จริง', 'ไม่จริง'], correct: 'จริง', exp: 'เนื่องจากโครงสร้างหลักของหอไอเฟลทำจากเหล็ก เมื่อได้รับความร้อนจากแสงแดดในฤดูร้อน เหล็กจะเกิดการขยายตัวทางความร้อน ทำให้หอไอเฟลอาจสูงขึ้นได้ถึง 15 เซนติเมตร' },
            { q: 'อวัยวะใดของร่างกายมนุษย์ที่ไม่เคยหยุดการเจริญเติบโตตลอดชีวิต?', options: ['ดวงตา', 'จมูกและหู'], correct: 'จมูกและหู', exp: 'ในขณะที่ส่วนอื่นๆ หยุดโตเมื่อพ้นช่วงวัยรุ่น แต่จมูกและหูซึ่งประกอบด้วยกระดูกอ่อนจะยังคงมีการเปลี่ยนแปลงและขยายขนาดขึ้นเล็กน้อยตามแรงโน้มถ่วงและอายุที่มากขึ้น' },
            { q: 'สัตว์ชนิดใดที่ "ไม่มีวันตาย" ตามธรรมชาติ?', options: ['แมงกะพรุนบางสายพันธุ์', 'เต่าทะเล'], correct: 'แมงกะพรุนบางสายพันธุ์', exp: 'แมงกะพรุนสายพันธุ์ Turritopsis dohrnii สามารถย้อนวงจรชีวิตจากวัยเจริญพันธุ์กลับไปเป็นระยะตัวอ่อน (Polyp) ได้ใหม่เมื่อได้รับบาดเจ็บหรือป่วย จึงถูกเรียกว่าแมงกะพรุนอมตะ' },
            { q: '"เสียงคำราม" ของสิงโต สามารถได้ยินไปไกลถึงระยะกี่กิโลเมตร?', options: ['2 กิโลเมตร', '8 กิโลเมตร'], correct: '8 กิโลเมตร', exp: 'เสียงคำรามของสิงโตตัวผู้มีความเข้มเสียงสูงมาก ซึ่งใช้ในการประกาศอาณาเขตและข่มขวัญศัตรู โดยในสภาพอากาศที่เหมาะสม เสียงนี้สามารถเดินทางไปได้ไกลถึง 8 กิโลเมตร' },
            { q: 'สัตว์ชนิดใดที่มีเลือดเป็น "สีน้ำเงิน"?', options: ['ม้าน้ำ', 'แมงดาทะเล'], correct: 'แมงดาทะเล', exp: 'เลือดของแมงดาทะเลมีสารที่เรียกว่า "ฮีโมไซยานิน" (Hemocyanin) ซึ่งมีทองแดงเป็นองค์ประกอบ เมื่อรวมตัวกับออกซิเจนจะกลายเป็นสีน้ำเงิน ต่างจากมนุษย์ที่มีธาตุเหล็ก (ฮีโมโกลบิน) ซึ่งเป็นสีแดง' }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;

        function startGame() {
            currentQuestionIndex = 0;
            score = 0;
            isAnswered = false;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            isAnswered = false;
            const q = questions[currentQuestionIndex];
            document.getElementById('progress-text').innerText = `ข้อที่ ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('score-text').innerText = `คะแนน: ${score}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-container').classList.add('hidden');
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-gray-100 bg-gray-50 text-gray-700 font-medium text-lg transition-all hover:bg-pink-50 hover:border-pink-200 hover:shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, btn) {
            if (isAnswered) return;
            isAnswered = true;
            
            const q = questions[currentQuestionIndex];
            const isCorrect = selected === q.correct;
            
            if (isCorrect) {
                score++;
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-green-400 bg-green-100 text-green-800 font-bold text-lg flex justify-between items-center shadow-md";
                btn.innerHTML += ' <span>✅</span>';
            } else {
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-red-300 bg-red-100 text-red-800 font-bold text-lg flex justify-between items-center";
                btn.innerHTML += ' <span>❌</span>';
                
                // Show correct answer too
                Array.from(document.getElementById('options-container').children).forEach(child => {
                    if (child.innerText.includes(q.correct)) {
                        child.className = "w-full text-left p-5 rounded-2xl border-2 border-green-200 bg-green-50 text-green-700 font-bold text-lg opacity-80";
                    } else if (child !== btn) {
                        child.className = "w-full text-left p-5 rounded-2xl border-2 border-gray-100 bg-gray-50 text-gray-400 font-medium text-lg opacity-50";
                    }
                });
            }

            // Show explanation
            const expBox = document.getElementById('explanation-box');
            const resultTitle = document.getElementById('result-title');
            if (isCorrect) {
                expBox.className = "p-6 rounded-2xl mb-8 border border-green-100 bg-green-50";
                resultTitle.innerText = "🎉 ถูกต้องเก่งมาก!";
                resultTitle.className = "font-bold text-lg mb-2 text-green-700";
            } else {
                expBox.className = "p-6 rounded-2xl mb-8 border border-orange-100 bg-orange-50";
                resultTitle.innerText = "😅 พลาดไปนิดเดียว!";
                resultTitle.className = "font-bold text-lg mb-2 text-orange-700";
            }

            document.getElementById('explanation-text').innerHTML = `<strong class="text-violet-600 block mb-1">เฉลย: ${q.correct}</strong> ${q.exp}`;
            document.getElementById('explanation-container').classList.remove('hidden');
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('next-btn').innerText = "ดูผลคะแนน 🏁";
            } else {
                document.getElementById('next-btn').innerHTML = "ข้อต่อไป ➡️";
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerHTML = `${score} <span class="text-3xl text-gray-400">/ ${questions.length}</span>`;
        }
    </script>
</body>
</html>
